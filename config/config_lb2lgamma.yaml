signal:
  name: "Lb2LambdaGamma"
  evt_gen_file : "evtgen/Lb2LambdaGamma.dec"
  evt_gen_label: Lambda_b0_SIGNAL
  evt_gen_pid : 5122
  pdg_mother  : 5122
  # Stable daughters of Lb -> Lambda0(-> p pi) gamma
  # (for anti-Lb, charge conjugation is handled in the analysis selection)
  pdg_daughters: [2212, -211, 22]

env:
  # If you run Snakemake from a python environment that is NOT Key4hep
  # (e.g. LHCb conda), do NOT `source key4hep` in the parent shell.
  # Instead, set these so each Snakemake job sources Key4hep in its own subshell.
  #
  # Leave empty ("") if you already run Snakemake from a Key4hep environment.
  key4hep_setup: "/cvmfs/sw.hsf.org/spackages6/key4hep-stack/2022-12-23/x86_64-centos7-gcc11.2.0-opt/ll3gi/setup.sh"
  key4hep_args:  ""
  # Optional: if you build FCCAnalyses inside this repo (recommended), set:
  #   external/FCCAnalyses/setup.sh
  fccanalyses_setup: "external/FCCAnalyses/setup.sh"

analysis:
  # "truth" (current default): truth-seeded matching (fast sanity check, NOT a realistic background estimate)
  # "reco": simple combinatorial reco (gives a background shape, still very simplified)
  mode: "truth"

# Background samples (edit to point to your centrally produced samples).
# Provide either:
#  - input_file_list: a text file with one ROOT path per line (recommended for large samples)
#  - input_files: a short YAML list of ROOT paths
backgrounds:
  - name: "Zbb"
    enabled: false
    input_file_list: "data/background_Zbb_files.txt"
    scale: 1.0

production:
  ecm_gev: 91.0
  nevents: 10000
  seed: 12345

urls:
  # FCC-config cards (winter2023) used in the FCC fast-sim tutorial
  pythia_cmd: "https://raw.githubusercontent.com/HEP-FCC/FCC-config/winter2023/FCCee/Generator/Pythia8/p8_ee_Zbb_ecm91_EVTGEN.cmd"
  delphes_card: "https://raw.githubusercontent.com/HEP-FCC/FCC-config/winter2023/FCCee/Delphes/card_IDEA.tcl"
  edm4hep_tcl: "https://raw.githubusercontent.com/HEP-FCC/FCC-config/winter2023/FCCee/Delphes/edm4hep_IDEA.tcl"
  decay_dec: "https://raw.githubusercontent.com/HEP-FCC/FCC-config/winter2023/FCCee/Generator/EvtGen/DECAY.DEC"
  evt_pdl: "https://raw.githubusercontent.com/HEP-FCC/FCC-config/winter2023/FCCee/Generator/EvtGen/evt.pdl"
  
paths: 
  delphes_out: "outputs/delphes/Lb2LambdaGamma_IDEA_edm4hep.root"
  analysis_dir: "outputs/analysis"
  plots_dir: "outputs/plots"

resources:
  analysis_cores: 4

plot:
  branch: "lb_reco_m"
  nbins: 120
  xmin: 4.8
  xmax: 6.4
  normalize: "none"   # "none" | "area"
  signal_scale: 1.0   # multiply signal histogram by this factor for visibility


# Many brackground inclusive
# /eos/experiment/fcc/ee/generation/DelphesEvents/winter2023/IDEA/p8_ee_Zbb_ecm91/events_*.root
